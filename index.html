<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NotionOS - AI Daily Planner ✨</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968914.png" type="image/png" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968914.png" />
    <script>
      const originalError = console.error;
      console.error = (...args) => {
        const msg = args[0] ? String(args[0]) : '';
        if (
          msg.includes('MetaMask') || 
          msg.includes('ethereum') || 
          msg.includes('web3') ||
          msg.includes('extension') ||
          msg.includes('failed to connect') ||
          msg.includes('websocket')
        ) {
          return;
        }
        originalError.apply(console, args);
      };
      
      // Also catch unhandled promise rejections which extensions often trigger
      window.addEventListener('unhandledrejection', (event) => {
        const msg = event.reason ? String(event.reason) : '';
        if (msg.includes('MetaMask') || msg.includes('ethereum')) {
          event.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
